<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Web Responsive</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- Header con logotipo, navbar y segundo logo -->
    <header class="header">
        <div class="logo">
            <img src="https://via.placeholder.com/100x50?text=Logo" alt="Logo Principal">
        </div>
        
        <nav class="navbar">
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="#" class="nav-link">Inicio</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Especialidades</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Blog</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Equipo</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Contacto</a>
                </li>
            </ul>
        </nav>
        
        <div class="secondary-logo">
            <img src="https://via.placeholder.com/60x60?text=Logo2" alt="Logo Secundario">
        </div>
        
        <!-- Botón mobile para menú responsive -->
        <div class="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </header>

    <!-- Contenido principal -->
    <main class="main-content">
        <section class="hero">
            <h1>Bienvenido a Nuestra Página Web</h1>
            <p>Esta es una página web responsive con header como solicitaste</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
